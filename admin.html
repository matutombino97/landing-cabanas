<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Refugio Cabañas</title>
    <link rel="stylesheet" href="style.css?v=2.1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/material_green.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            padding: 20px;
            background: var(--bg-crema);
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h4 { margin-top: 10px; color: var(--primary); }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--accent); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        th { background: var(--bg-crema); color: var(--primary); }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-pendiente { background: #fff3cd; color: #856404; }
        .status-confirmado { background: #d4edda; color: #155724; }

        .btn-action {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: var(--transition);
        }
        .btn-delete { background: #f8d7da; color: #721c24; }
        .btn-confirm { background: #d1ecf1; color: #0c5460; }
        .btn-action:hover { opacity: 0.8; }

        .manual-block {
            margin-top: 40px;
            padding: 30px;
            background: var(--primary);
            color: white;
            border-radius: 15px;
        }
        .manual-block h3 { color: white; margin-bottom: 20px; }
        .block-form { display: flex; gap: 15px; align-items: flex-end; }
        .block-form .form-group { flex: 1; }
        .block-form label { color: white; display: block; margin-bottom: 8px; }
        .block-form input { width: 100%; padding: 12px; border-radius: 8px; border: none; }
    </style>
</head>
<body style="background: var(--bg-crema);">

    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="img/cabaña.jpeg" alt="Logo" class="logo-img">
                <span>Refugio <small style="font-size: 0.6em; opacity: 0.7;">ADMIN</small></span>
            </a>
            <a href="index.html" class="btn-outline">Volver al Sitio</a>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Gestión de Reservas</h2>
            <button id="refresh-btn" class="btn-primary">Actualizar Datos</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="material-symbols-outlined">pending_actions</span>
                <div class="value" id="count-pendiente">0</div>
                <h4>Pendientes</h4>
            </div>
            <div class="stat-card">
                <span class="material-symbols-outlined">event_available</span>
                <div class="value" id="count-confirmado">0</div>
                <h4>Bloqueadas</h4>
            </div>
        </div>

        <h3>Reservas Recientes</h3>
        <table>
            <thead>
                <tr>
                    <th>Llegada</th>
                    <th>Salida</th>
                    <th>Huéspedes</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="reservations-table">
                <!-- Data will be injected here -->
            </tbody>
        </table>

        <div class="manual-block">
            <h3>Bloqueo Manual de Fechas</h3>
            <p style="margin-bottom: 20px; opacity: 0.8;">Cerrar fechas por mantenimiento o reserva externa (Booking/Airbnb).</p>
            <form class="block-form" id="block-form">
                <div class="form-group">
                    <label>Desde:</label>
                    <input type="text" id="block-in" placeholder="Seleccionar" required>
                </div>
                <div class="form-group">
                    <label>Hasta:</label>
                    <input type="text" id="block-out" placeholder="Seleccionar" required>
                </div>
                <button type="submit" class="btn-primary">Bloquear Fechas</button>
            </form>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATcGy_62RtFXZlfzjieinkXf3-mTeTleU",
            authDomain: "cabanas-b212f.firebaseapp.com",
            projectId: "cabanas-b212f",
            storageBucket: "cabanas-b212f.firebasestorage.app",
            messagingSenderId: "397554221254",
            appId: "1:397554221254:web:2e6ad1fa37e638cf6897c7",
            measurementId: "G-NYTYM4ZNSS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Function
        async function loadReservations() {
            const tableBody = document.getElementById('reservations-table');
            const q = await getDocs(collection(db, "reservations"));
            
            tableBody.innerHTML = '';
            let counts = { pendiente: 0, confirmado: 0 };

            q.forEach((res) => {
                const data = res.data();
                const id = res.id;
                if (data.status && counts.hasOwnProperty(data.status)) {
                    counts[data.status]++;
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data.checkin}</td>
                    <td>${data.checkout}</td>
                    <td>${data.huespedes || '-'}</td>
                    <td><span class="status-badge status-${data.status}">${data.status.toUpperCase()}</span></td>
                    <td style="display: flex; gap: 10px;">
                        ${data.status === 'pendiente' ? `<button class="btn-action btn-confirm" data-id="${id}">Confirmar</button>` : ''}
                        <button class="btn-action btn-delete" data-id="${id}">Eliminar</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('count-pendiente').innerText = counts.pendiente;
            document.getElementById('count-confirmado').innerText = counts.confirmado;

            // Add events to buttons
            document.querySelectorAll('.btn-confirm').forEach(btn => {
                btn.onclick = async () => {
                    await updateDoc(doc(db, "reservations", btn.dataset.id), { status: 'confirmado' });
                    loadReservations();
                }
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = async () => {
                    if(confirm('¿Seguro que querés liberar estas fechas?')) {
                        await deleteDoc(doc(db, "reservations", btn.dataset.id));
                        loadReservations();
                    }
                }
            });
        }

        // Manual Block Form
        document.getElementById('block-form').onsubmit = async (e) => {
            e.preventDefault();
            const checkin = document.getElementById('block-in').value;
            const checkout = document.getElementById('block-out').value;
            
            await addDoc(collection(db, "reservations"), {
                checkin,
                checkout,
                status: 'confirmado',
                type: 'manual'
            });
            alert('Fechas bloqueadas correctamente.');
            loadReservations();
        };

        // Flatpickr setup
        const inPicker = flatpickr("#block-in", { dateFormat: "Y-m-d", minDate: "today" });
        const outPicker = flatpickr("#block-out", { dateFormat: "Y-m-d", minDate: "today" });

        document.getElementById('refresh-btn').onclick = loadReservations;

        // Initial load
        loadReservations();

    </script>
</body>
</html>
